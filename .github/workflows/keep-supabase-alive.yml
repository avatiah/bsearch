name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'      # Запуск в 09:00 UTC (Пн и Чт)
  workflow_dispatch:           # Кнопка ручного запуска в GitHub Actions

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Ping Supabase Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node - << 'EOF'
          const { createClient } = require('@supabase/supabase-js');

          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);

          async function ping() {
            console.log('Отправка проверочного запроса в Supabase...');
            try {
              // Делаем запрос к несуществующей таблице 'keep_alive_ping'.
              // Этого достаточно, чтобы разбудить инстанс базы.
              const { error } = await supabase
                .from('keep_alive_ping')
                .select('*')
                .limit(1);

              // Если получаем ошибку 'PGRST116' (The table does not exist) — это УСПЕХ.
              // Это значит, что API работает и база данных ответила на запрос.
              if (error && error.code === 'PGRST116') {
                console.log('База ответила: Таблица не найдена, но соединение установлено успешно.');
              } else if (error) {
                // Если ошибка другая (например, 401 или 403), выводим её для отладки
                console.log('Получен ответ от API:', error.message);
              } else {
                console.log('Запрос прошел успешно (таблица существует).');
              }
              
              console.log('Процесс пробуждения завершен.');
            } catch (err) {
              console.error('Ошибка при выполнении запроса:', err.message);
              process.exit(1);
            }
          }

          ping();
          EOF
