name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'      # Запуск в 09:00 UTC каждый понедельник и четверг
  workflow_dispatch:           # Возможность ручного запуска из вкладки Actions

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Ping Supabase Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node - << 'EOF'
          const { createClient } = require('@supabase/supabase-js');

          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_KEY;

          if (!SUPABASE_URL || !SUPABASE_KEY) {
            console.error('Ошибка: SUPABASE_URL или SUPABASE_KEY не найдены в Secrets!');
            process.exit(1);
          }

          const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

          async function ping() {
            try {
              console.log('Попытка связи с Supabase...');
              
              // Ключевое исправление: явно указываем схему pg_catalog, 
              // чтобы не получать ошибку отсутствия таблицы в схеме public.
              const { data, error } = await supabase
                .schema('pg_catalog')
                .from('pg_tables')
                .select('tablename')
                .limit(1);

              if (error) {
                throw error;
              }

              console.log('Успех! База проснулась. Ответ получен.');
            } catch (err) {
              console.error('Ошибка при активации базы:', err.message);
              process.exit(1);
            }
          }

          ping();
          EOF
