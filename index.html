<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSearch | Kishinev Jewish Cemetery</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --brand-color: #1e3a8a;
            --bg-main: #fcfcfd;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --gold: #fbbf24;
            --success: #059669;
        }

        body { margin: 0; padding: 0; background: var(--bg-main); color: var(--text-main); font-family: "Inter", sans-serif; line-height: 1.6; }
        .top-bar { display: flex; justify-content: flex-end; padding: 10px 20px; gap: 10px; background: #0f172a; }
        .lang-btn { background: none; border: 1px solid #334155; color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .lang-btn.active { background: var(--brand-color); border-color: var(--brand-color); }

        .hero-section { position: relative; background: var(--brand-color); color: white; padding: 50px 20px; text-align: center; }
        .container { max-width: 1000px; margin: -30px auto 40px; padding: 0 20px; position: relative; z-index: 3; }

        .search-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .search-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; width: 100%; box-sizing: border-box; }

        .btn-main { background: var(--brand-color); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: white; color: var(--text-main); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-share { background: #f3f4f6; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--brand-color); font-weight: bold; }
        .btn-share:hover { background: #e5e7eb; }

        .results-wrapper { margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #f9fafb; padding: 15px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .fav-star { cursor: pointer; color: #d1d5db; font-size: 20px; transition: color 0.2s; }
        .fav-star.active { color: var(--gold); }
        .no-pdf { width: 40px; text-align: center; }

        @media (max-width: 768px) {
            .search-group { flex-direction: column; }
            table thead { display: none; }
            tr { display: block; border: 1px solid var(--border); margin-bottom: 15px; border-radius: 8px; padding: 10px; background: white; }
            td { display: flex; justify-content: space-between; border: none; padding: 8px 0; text-align: right; }
            td::before { content: attr(data-label); font-weight: 800; font-size: 10px; color: var(--text-muted); text-transform: uppercase; text-align: left; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('he')">עב</button>
</div>

<header class="hero-section">
    <h1 id="t-title">Кишиневское Еврейское Кладбище</h1>
    <p id="t-subtitle">Электронный реестр памяти</p>
</header>

<div class="container">
    <div class="search-card" id="searchArea">
        <div id="status" class="search-hint" style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px;">Поиск на кириллице или латинице</div>
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="Фамилия..." disabled>
            <button class="btn-main" id="searchBtn" onclick="performSearch()" disabled>ПОИСК</button>
        </div>
        <div style="display:flex; justify-content: space-between;">
            <button class="btn-text" style="background:none; border:none; color:var(--brand-color); cursor:pointer; font-weight:600;" onclick="showFavorites()">⭐ Избранное (<span id="fav-count">0</span>)</button>
        </div>
    </div>

    <div class="results-wrapper" id="resultsWrapper" style="display:none;">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn-secondary" onclick="resetUI()">← Назад</button>
            <button class="btn-main" onclick="exportToPDF()" style="background:var(--success)">📄 Скачать PDF</button>
        </div>
        <div id="pdf-content">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th class="no-pdf">⭐</th>
                        <th id="t-col-fio">ФИО</th>
                        <th id="t-col-b">Рождение</th>
                        <th id="t-col-d">Смерть</th>
                        <th id="t-col-s">Сектор</th>
                        <th id="t-col-n">№ Могилы</th>
                        <th class="no-pdf">Поделиться</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPQWudyymuRTEaC9_FQYCyZFSoAp2P30Me_Th6dWDMHckiD6BnT3fQ9cfR4UreAlmxrujIb5aqKlJ/pub?gid=726531709&single=true&output=csv';
    let allData = [];
    let currentView = [];
    let favorites = JSON.parse(localStorage.getItem('bsearch_favs') || '[]');

    const translitMap = {"a":"а","b":"б","v":"в","g":"г","d":"д","e":"е","yo":"ё","zh":"ж","z":"з","i":"и","j":"й","k":"к","l":"л","m":"м","n":"н","o":"о","p":"п","r":"р","s":"с","t":"т","u":"у","f":"ф","h":"х","ts":"ц","ch":"ч","sh":"ш","shch":"щ","y":"ы","yu":"ю","ya":"я"};

    function autoTranslit(text) {
        let output = text.toLowerCase();
        const complex = ["shch","yo","zh","ts","ch","sh","yu","ya"];
        complex.forEach(c => { output = output.replace(new RegExp(c, "g"), translitMap[c]); });
        return output.split('').map(char => translitMap[char] || char).join('');
    }

    async function init() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            allData = text.split('\n').slice(1).map(line => {
                const cells = []; let cur = ''; let q = false;
                for (let c of line) { if (c === '"') q = !q; else if (c === ',' && !q) { cells.push(cur.trim()); cur = ''; } else cur += c; }
                cells.push(cur.trim()); return cells;
            }).filter(r => r[1]);

            document.getElementById('searchInput').disabled = false;
            document.getElementById('searchBtn').disabled = false;
            updateFavCount();

            // ПРОВЕРКА DEEP LINK (запуск если в URL есть ?id=...)
            const urlParams = new URLSearchParams(window.location.search);
            const sharedId = urlParams.get('id');
            if (sharedId) {
                const record = allData.find(r => r[0] === sharedId);
                if (record) render([record]);
            }
        } catch (e) { console.error("Data error", e); }
    }

    function performSearch() {
        const val = document.getElementById('searchInput').value.trim().toLowerCase();
        if(!val) return;
        const query = /[a-z]/.test(val) ? autoTranslit(val) : val;
        currentView = allData.filter(r => r[1].toLowerCase().includes(query));
        if (currentView.length === 0) return alert("Ничего не найдено");
        render(currentView);
    }

    function render(data) {
        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = '';
        data.forEach(row => {
            const isFav = favorites.some(f => f[0] === row[0]);
            tbody.innerHTML += `<tr>
                <td class="no-pdf"><span class="fav-star ${isFav?'active':''}" onclick="toggleFav('${row[0]}')">★</span></td>
                <td data-label="ФИО">${row[1]}</td>
                <td data-label="Рождение">${row[2]||'-'}</td>
                <td data-label="Смерть">${row[3]||'-'}</td>
                <td data-label="Сектор">${row[5]||'-'}</td>
                <td data-label="Могила">${row[4]||'-'}</td>
                <td class="no-pdf"><button class="btn-share" onclick="copyShareLink('${row[0]}')">🔗 Ссылка</button></td>
            </tr>`;
        });
        document.getElementById('searchArea').style.display = 'none';
        document.getElementById('resultsWrapper').style.display = 'block';
    }

    function copyShareLink(id) {
        const base = window.location.origin + window.location.pathname;
        const link = `${base}?id=${id}`;
        navigator.clipboard.writeText(link).then(() => {
            alert("Ссылка скопирована! Отправьте её родственникам.");
        });
    }

    function toggleFav(id) {
        const idx = favorites.findIndex(f => f[0] === id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push(allData.find(r => r[0] === id));
        localStorage.setItem('bsearch_favs', JSON.stringify(favorites));
        updateFavCount();
        render(currentView.length ? currentView : favorites);
    }

    function showFavorites() {
        if (favorites.length === 0) return alert("Список пуст");
        currentView = []; // сбрасываем поиск при просмотре избранного
        render(favorites);
    }

    function updateFavCount() { document.getElementById('fav-count').innerText = favorites.length; }
    function resetUI() { 
        document.getElementById('searchArea').style.display = 'block'; 
        document.getElementById('resultsWrapper').style.display = 'none';
        // Очищаем URL при возврате к поиску
        window.history.replaceState({}, '', window.location.pathname);
    }

    function exportToPDF() {
        const element = document.getElementById('pdf-content');
        const hidden = document.querySelectorAll('.no-pdf');
        hidden.forEach(s => s.style.display = 'none');
        html2pdf().set({ margin: 10, filename: 'Registry.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } })
                 .from(element).save().then(() => hidden.forEach(s => s.style.display = ''));
    }

    window.onload = init;
</script>
</body>
</html>
