<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSearch | Navigation & Sharing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --brand: #1e3a8a; --bg: #fcfcfd; --border: #e5e7eb; --success: #059669; }
        body { margin: 0; font-family: "Inter", sans-serif; background: var(--bg); }
        
        .hero { background: var(--brand); color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 1000px; margin: -20px auto 40px; padding: 0 20px; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .search-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        
        .btn-main { background: var(--brand); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-gps { background: #3b82f6; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; margin-top: 5px; display: block; }
        
        #map { height: 400px; border-radius: 12px; margin-top: 20px; border: 1px solid var(--border); z-index: 1; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th { background: #f9fafb; padding: 12px; text-align: left; font-size: 11px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .filters { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding: 10px; background: #f3f4f6; border-radius: 8px; }
        
        .share-link { color: var(--brand); text-decoration: none; font-weight: bold; font-size: 12px; cursor: pointer; }

        @media (max-width: 768px) {
            .search-group { flex-direction: column; }
            table, thead, tbody, th, td, tr { display: block; }
            tr { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
            td { display: flex; justify-content: space-between; border: none; padding: 5px 0; }
            td::before { content: attr(data-label); font-weight: bold; color: var(--text-muted); }
        }
    </style>
</head>
<body>

<header class="hero">
    <h1>Кишиневское Еврейское Кладбище</h1>
    <p>Навигация и реестр памяти</p>
</header>

<div class="container">
    <div class="card" id="searchArea">
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="Введите фамилию...">
            <button class="btn-main" onclick="performSearch()">ПОИСК</button>
        </div>
        <div style="display:flex; justify-content: space-between;">
            <button onclick="document.getElementById('filters').style.display='grid'" style="background:none; border:none; color:var(--brand); cursor:pointer; font-size:12px;">⚙ Фильтры по годам</button>
            <button onclick="showFavorites()" style="background:none; border:none; color:var(--brand); cursor:pointer; font-size:12px;">⭐ Избранное (<span id="fav-count">0</span>)</button>
        </div>
        <div id="filters" class="filters">
            <input type="number" id="yFrom" placeholder="Год рождения от">
            <input type="number" id="yTo" placeholder="Год смерти до">
        </div>
    </div>

    <div id="resultsWrapper" style="display:none; margin-top: 20px;">
        <button class="btn-main" onclick="location.reload()" style="background:#6b7280; margin-bottom: 10px;">← Назад</button>
        <div class="card">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>ФИО</th>
                        <th>Сектор/Ряд/Место</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <div id="map"></div>

    <div class="card" style="margin-top:20px;">
        <h3>Обратная связь и уточнение координат</h3>
        <p style="font-size:13px; color:#6b7280;">Если вы нашли могилу, нажмите «Отправить координаты» в таблице выше, чтобы данные подставились в эту форму.</p>
        <form action="https://formspree.io/f/xvzbwgzp" method="POST" id="coordsForm">
            <input type="hidden" name="grave_id" id="form_id">
            <input type="email" name="email" placeholder="Ваш Email" required style="width:100%; padding:10px; margin-bottom:10px; border:1px solid var(--border); border-radius:6px; box-sizing:border-box;">
            <textarea name="message" id="form_msg" placeholder="Ваше сообщение или GPS данные..." required style="width:100%; height:80px; padding:10px; border:1px solid var(--border); border-radius:6px; box-sizing:border-box;"></textarea>
            <button type="submit" class="btn-main" style="background:var(--success); width:100%;">ОТПРАВИТЬ ДАННЫЕ В БАЗУ</button>
        </form>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPQWudyymuRTEaC9_FQYCyZFSoAp2P30Me_Th6dWDMHckiD6BnT3fQ9cfR4UreAlmxrujIb5aqKlJ/pub?gid=726531709&single=true&output=csv';
    let allData = [];
    let map, marker;

    // Инициализация карты
    function initMap() {
        map = L.map('map').setView([47.0356, 28.7970], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        marker = L.marker([47.0356, 28.7970]).addTo(map).bindPopup("Центральный вход").openPopup();
    }

    async function loadData() {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        allData = text.split('\n').slice(1).map(l => l.split(',')).filter(r => r[1]);
        
        // Deep Link: если в ссылке есть ID
        const urlId = new URLSearchParams(window.location.search).get('id');
        if(urlId) {
            const r = allData.find(x => x[0] === urlId);
            if(r) render([r]);
        }
    }

    function performSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const yF = parseInt(document.getElementById('yFrom').value) || 0;
        const yT = parseInt(document.getElementById('yTo').value) || 2050;
        
        const res = allData.filter(r => {
            const nameOk = r[1].toLowerCase().includes(q);
            const b = parseInt(r[2]) || 0;
            const d = parseInt(r[3]) || 2050;
            const yearOk = (b >= yF || yF === 0) && (d <= yT);
            return nameOk && yearOk;
        });
        render(res);
    }

    function render(data) {
        document.getElementById('searchArea').style.display = 'none';
        document.getElementById('resultsWrapper').style.display = 'block';
        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = '';
        
        data.forEach(r => {
            tbody.innerHTML += `
                <tr>
                    <td data-label="ФИО"><b>${r[1]}</b><br><small>${r[2]||'?'}-${r[3]||'?'}</small></td>
                    <td data-label="Место">Сектор: ${r[5]}, Ряд: ${r[4]}</td>
                    <td data-label="Действия">
                        <span class="share-link" onclick="copyLink('${r[0]}')">🔗 Ссылка</span>
                        <button class="btn-gps" onclick="getGPS('${r[0]}', '${r[1]}')">📍 Я у могилы</button>
                    </td>
                </tr>`;
        });
        
        // Визуальное действие: Если найден один человек или сектор, двигаем карту
        if(data.length > 0) {
            map.setView([47.0356, 28.7970], 17); // Здесь можно добавить логику координат для секторов
            marker.setLatLng([47.0356, 28.7970]).setPopupContent("Сектор: " + data[0][5]).openPopup();
        }
    }

    function copyLink(id) {
        const link = window.location.origin + window.location.pathname + "?id=" + id;
        navigator.clipboard.writeText(link).then(() => alert("Ссылка скопирована!"));
    }

    function getGPS(id, name) {
        if (!navigator.geolocation) return alert("GPS не поддерживается");
        
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            document.getElementById('form_id').value = id;
            document.getElementById('form_msg').value = `Уточнение координат для: ${name} (ID: ${id}). \nКоординаты: https://www.google.com/maps?q=${lat},${lon}`;
            document.getElementById('coordsForm').scrollIntoView();
            alert("Координаты считаны и добавлены в форму внизу страницы!");
        }, () => alert("Не удалось получить доступ к GPS"));
    }

    window.onload = () => { initMap(); loadData(); };
</script>
</body>
</html>
