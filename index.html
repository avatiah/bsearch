<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSearch | Kishinev Jewish Cemetery</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --brand: #1e3a8a; --bg: #fcfcfd; --border: #e5e7eb; --success: #059669; }
        body { margin: 0; font-family: "Inter", sans-serif; background: var(--bg); color: #1f2937; transition: all 0.3s; }
        
        .top-bar { display: flex; justify-content: flex-end; padding: 10px 20px; gap: 10px; background: #0f172a; }
        .lang-btn { background: none; border: 1px solid #334155; color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .lang-btn.active { background: var(--brand); border-color: var(--brand); }

        .hero { background: var(--brand); color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 1000px; margin: -20px auto 40px; padding: 0 20px; position: relative; z-index: 5; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid var(--border); margin-bottom: 20px; }
        .search-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; }
        
        .btn-main { background: var(--brand); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-text { background: none; border: none; color: var(--brand); cursor: pointer; font-weight: 600; font-size: 13px; }
        
        #map { height: 400px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); z-index: 1; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9fafb; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }

        @media (max-width: 768px) {
            .search-group { flex-direction: column; }
            th { display: none; }
            td { display: flex; justify-content: space-between; border: none; padding: 8px 0; align-items: center; }
            td::before { content: attr(data-label); font-weight: 700; color: #6b7280; font-size: 11px; }
            tr { display: block; border-bottom: 2px solid var(--border); padding: 10px 0; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('he')">עב</button>
</div>

<header class="hero">
    <h1 id="t-title">Кишиневское Еврейское Кладбище</h1>
    <p id="t-subtitle">Реестр захоронений и навигация</p>
</header>

<div class="container">
    <div class="card" id="searchBox">
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="Введите фамилию">
            <button class="btn-main" id="t-search-btn" onclick="performSearch()">ПОИСК</button>
        </div>
        <div style="display:flex; justify-content: space-between;">
            <button class="btn-text" id="t-filter-btn" onclick="toggleFilters()">⚙ Годы жизни</button>
            <button class="btn-text" id="t-fav-btn" onclick="showFavorites()">⭐ Избранное (<span id="fav-count">0</span>)</button>
        </div>
        <div id="filterPanel" style="display:none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
            <input type="number" id="yearFrom" placeholder="От">
            <input type="number" id="yearTo" placeholder="До">
        </div>
    </div>

    <div id="resultsView" style="display:none;">
        <div style="margin-bottom: 15px; display: flex; gap: 10px;">
            <button class="btn-main" id="t-back" onclick="location.reload()" style="background:#64748b;">← Назад</button>
            <button class="btn-main" id="t-pdf" onclick="exportToPDF()" style="background:var(--success);">📄 PDF</button>
        </div>
        <div class="card" id="pdf-area">
            <table>
                <thead>
                    <tr id="table-head">
                        <th id="h-fio">ФИО</th>
                        <th id="h-b">Рождение</th>
                        <th id="h-d">Смерть</th>
                        <th id="h-s">Сектор</th>
                        <th id="h-n">№ Могилы</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <div id="map"></div>

    <div class="card">
        <h3 id="t-contact">Обратная связь</h3>
        <form action="https://formspree.io/f/xvzbwgzp" method="POST" style="display: grid; gap: 10px;">
            <input type="email" name="email" placeholder="Email" required style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;">
            <textarea name="message" id="t-msg-ph" placeholder="Ваше сообщение..." rows="3" style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;"></textarea>
            <button type="submit" class="btn-main" id="t-send">ОТПРАВИТЬ</button>
        </form>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPQWudyymuRTEaC9_FQYCyZFSoAp2P30Me_Th6dWDMHckiD6BnT3fQ9cfR4UreAlmxrujIb5aqKlJ/pub?gid=726531709&single=true&output=csv';
    const cemeteryCenter = [47.0356, 28.7970];

    const translations = {
        ru: { title: "Кишиневское Еврейское Кладбище", subtitle: "Реестр захоронений и навигация", search: "ПОИСК", filter: "⚙ Годы жизни", fav: "⭐ Избранное", back: "← Назад", pdf: "📄 Скачать PDF", fio: "ФИО", b: "Рождение", d: "Смерть", s: "Сектор", n: "№ Могилы", contact: "Обратная связь", send: "ОТПРАВИТЬ", ph: "Введите фамилию", msg: "Ваше сообщение...", alert: "Ничего не найдено" },
        en: { title: "Kishinev Jewish Cemetery", subtitle: "Burial Registry & Navigation", search: "SEARCH", filter: "⚙ Years of Life", fav: "⭐ Favorites", back: "← Back", pdf: "📄 Download PDF", fio: "Full Name", b: "Birth", d: "Death", s: "Sector", n: "Grave No.", contact: "Contact Us", send: "SEND", ph: "Enter last name", msg: "Your message...", alert: "Nothing found" },
        he: { title: "בית העלמין היהודי בקישינב", subtitle: "מאגר קבורה וניווט", search: "חיפוש", filter: "⚙ שנות חיים", fav: "⭐ מועדפים", back: "← חזור", pdf: "📄 הורד PDF", fio: "שם מלא", b: "לידה", d: "פטירה", s: "חלקה", n: "קבר מס'", contact: "צור קשר", send: "שלח", ph: "הזן שם משפחה", msg: "ההודעה שלך...", alert: "לא נמצאו תוצאות" }
    };

    const translitMap = {"a":"а","b":"б","v":"в","g":"г","d":"д","e":"е","yo":"ё","zh":"ж","z":"з","i":"и","j":"й","k":"к","l":"л","m":"м","n":"н","o":"о","p":"п","r":"р","s":"с","t":"т","u":"у","f":"ф","h":"х","ts":"ц","ch":"ч","sh":"ш","shch":"щ","y":"ы","yu":"ю","ya":"я"};
    let currentLang = 'ru';
    let allData = [];
    let map;

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === lang));
        const t = translations[lang];
        document.getElementById('t-title').innerText = t.title;
        document.getElementById('t-subtitle').innerText = t.subtitle;
        document.getElementById('t-search-btn').innerText = t.search;
        document.getElementById('t-filter-btn').innerText = t.filter;
        document.getElementById('t-back').innerText = t.back;
        document.getElementById('t-pdf').innerText = t.pdf;
        document.getElementById('h-fio').innerText = t.fio;
        document.getElementById('h-b').innerText = t.b;
        document.getElementById('h-d').innerText = t.d;
        document.getElementById('h-s').innerText = t.s;
        document.getElementById('h-n').innerText = t.n;
        document.getElementById('t-contact').innerText = t.contact;
        document.getElementById('t-send').innerText = t.send;
        document.getElementById('searchInput').placeholder = t.ph;
        document.getElementById('t-msg-ph').placeholder = t.msg;
        document.body.dir = lang === 'he' ? 'rtl' : 'ltr';
    }

    function autoTranslit(text) {
        let output = text.toLowerCase();
        const complex = ["shch","yo","zh","ts","ch","sh","yu","ya"];
        complex.forEach(c => { output = output.replace(new RegExp(c, "g"), translitMap[c]); });
        return output.split('').map(char => translitMap[char] || char).join('');
    }

    function initMap() {
        map = L.map('map').setView(cemeteryCenter, 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
        L.marker(cemeteryCenter).addTo(map).bindPopup("Kishinev Cemetery");
    }

    async function loadData() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            allData = text.split('\n').slice(1).map(l => {
                const cells = []; let cur = ''; let q = false;
                for (let c of l) { if (c === '"') q = !q; else if (c === ',' && !q) { cells.push(cur.trim()); cur = ''; } else cur += c; }
                cells.push(cur.trim()); return cells;
            }).filter(r => r[1]);
        } catch(e) { console.error("Data load error"); }
    }

    function performSearch() {
        const val = document.getElementById('searchInput').value.trim().toLowerCase();
        const yF = parseInt(document.getElementById('yearFrom').value) || 0;
        const yT = parseInt(document.getElementById('yearTo').value) || 2050;
        const query = /[a-z]/.test(val) ? autoTranslit(val) : val;

        const results = allData.filter(r => {
            const nameMatch = r[1].toLowerCase().includes(query);
            const sectorMatch = (r[5] && r[5].toLowerCase() === val);
            const b = parseInt(r[2]) || 0;
            const d = parseInt(r[3]) || 2050;
            const yearMatch = (b >= yF || yF === 0) && (d <= yT);
            return (nameMatch || sectorMatch) && yearMatch;
        });

        if(results.length) renderResults(results);
        else alert(translations[currentLang].alert);
    }

    function renderResults(data) {
        document.getElementById('searchBox').style.display = 'none';
        document.getElementById('resultsView').style.display = 'block';
        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = '';
        const t = translations[currentLang];

        data.forEach(r => {
            tbody.innerHTML += `
                <tr>
                    <td data-label="${t.fio}"><b>${r[1]}</b></td>
                    <td data-label="${t.b}">${r[2]||'-'}</td>
                    <td data-label="${t.d}">${r[3]||'-'}</td>
                    <td data-label="${t.s}">${r[5]||'-'}</td>
                    <td data-label="${t.n}">${r[4]||'-'}</td>
                </tr>`;
        });
    }

    function toggleFilters() {
        const p = document.getElementById('filterPanel');
        p.style.display = p.style.display === 'none' ? 'grid' : 'none';
    }

    function exportToPDF() {
        const element = document.getElementById('pdf-area');
        html2pdf().from(element).save('BSearch_Kishinev.pdf');
    }

    window.onload = () => { initMap(); loadData(); setLang('ru'); };
</script>
</body>
</html>
