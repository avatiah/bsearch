<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSearch | Kishinev Jewish Cemetery</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --brand: #1e3a8a; --bg: #fcfcfd; --border: #e5e7eb; --success: #059669; }
        body { margin: 0; font-family: "Inter", sans-serif; background: var(--bg); color: #1f2937; }
        
        .hero { background: var(--brand); color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 1000px; margin: -20px auto 40px; padding: 0 20px; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .search-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; }
        
        .btn-main { background: var(--brand); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-text { background: none; border: none; color: var(--brand); cursor: pointer; font-weight: 600; font-size: 13px; }
        
        #map { height: 450px; border-radius: 12px; margin: 20px 0; border: 1px solid var(--border); z-index: 1; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f9fafb; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .btn-map { background: #eff6ff; color: var(--brand); border: 1px solid #dbeafe; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; }
        .btn-share { background: #f3f4f6; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }

        @media (max-width: 768px) {
            .search-group { flex-direction: column; }
            th { display: none; }
            td { display: flex; justify-content: space-between; border: none; padding: 8px 0; align-items: center; }
            td::before { content: attr(data-label); font-weight: 700; color: #6b7280; font-size: 11px; }
            tr { display: block; border-bottom: 2px solid var(--border); padding: 10px 0; }
        }
    </style>
</head>
<body>

<header class="hero">
    <h1>Кишиневское Еврейское Кладбище</h1>
    <p>Реестр захоронений и навигация по участкам</p>
</header>

<div class="container">
    <div class="card" id="searchBox">
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="Введите фамилию">
            <button class="btn-main" onclick="performSearch()">ПОИСК</button>
        </div>
        <div style="display:flex; justify-content: space-between;">
            <button class="btn-text" onclick="toggleFilters()">⚙ Годы жизни</button>
            <button class="btn-text" onclick="showFavorites()">⭐ Избранное (<span id="fav-count">0</span>)</button>
        </div>
        <div id="filterPanel" style="display:none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
            <input type="number" id="yearFrom" placeholder="Год рождения от">
            <input type="number" id="yearTo" placeholder="Год смерти до">
        </div>
    </div>

    <div id="resultsView" style="display:none; margin-top: 20px;">
        <div style="margin-bottom: 15px; display: flex; gap: 10px;">
            <button class="btn-main" onclick="location.reload()" style="background:#64748b;">← Назад</button>
            <button class="btn-main" onclick="exportToPDF()" style="background:var(--success);">📄 Скачать PDF</button>
        </div>
        <div class="card" id="pdf-area">
            <table>
                <thead>
                    <tr>
                        <th>ФИО</th>
                        <th>Рождение</th>
                        <th>Смерть</th>
                        <th>Сектор</th>
                        <th>№ Могилы</th>
                        <th>Навигация</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <div id="map"></div>

    <div class="card">
        <h3>Обратная связь</h3>
        <form action="https://formspree.io/f/xvzbwgzp" method="POST" style="display: grid; gap: 10px;">
            <input type="email" name="email" placeholder="Ваш Email" required style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;">
            <textarea name="message" placeholder="Уточнить данные или задать вопрос..." rows="3" style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;"></textarea>
            <button type="submit" class="btn-main">ОТПРАВИТЬ</button>
        </form>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPQWudyymuRTEaC9_FQYCyZFSoAp2P30Me_Th6dWDMHckiD6BnT3fQ9cfR4UreAlmxrujIb5aqKlJ/pub?gid=726531709&single=true&output=csv';
    
    // ВПИШИТЕ СЮДА ТОЧНЫЕ КООРДИНАТЫ ЦЕНТРОВ СЕКТОРОВ
    const sectorCoords = {
        "1": [47.0343, 28.7952],
        "2": [47.0348, 28.7958],
        "3": [47.0354, 28.7968],
        "4": [47.0359, 28.7974],
        "5": [47.0363, 28.7979],
        "6": [47.0367, 28.7983],
        "default": [47.0356, 28.7970]
    };

    const translitMap = {"a":"а","b":"б","v":"в","g":"г","d":"д","e":"е","yo":"ё","zh":"ж","z":"з","i":"и","j":"й","k":"к","l":"л","m":"м","n":"н","o":"о","p":"п","r":"р","s":"с","t":"т","u":"у","f":"ф","h":"х","ts":"ц","ch":"ч","sh":"ш","shch":"щ","y":"ы","yu":"ю","ya":"я"};

    function autoTranslit(text) {
        let output = text.toLowerCase();
        const complex = ["shch","yo","zh","ts","ch","sh","yu","ya"];
        complex.forEach(c => { output = output.replace(new RegExp(c, "g"), translitMap[c]); });
        return output.split('').map(char => translitMap[char] || char).join('');
    }

    let allData = [];
    let map, marker;

    function initMap() {
        map = L.map('map').setView(sectorCoords.default, 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
        marker = L.marker(sectorCoords.default).addTo(map).bindPopup("Кишиневское Еврейское Кладбище");
    }

    async function loadData() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            allData = text.split('\n').slice(1).map(l => {
                const cells = []; let cur = ''; let q = false;
                for (let c of l) { if (c === '"') q = !q; else if (c === ',' && !q) { cells.push(cur.trim()); cur = ''; } else cur += c; }
                cells.push(cur.trim()); return cells;
            }).filter(r => r[1]);
            
            const urlId = new URLSearchParams(window.location.search).get('id');
            if(urlId) {
                const entry = allData.find(x => x[0] === urlId);
                if(entry) renderResults([entry]);
            }
        } catch(e) { console.error("Data Load Error"); }
    }

    function performSearch() {
        const val = document.getElementById('searchInput').value.trim().toLowerCase();
        const yF = parseInt(document.getElementById('yearFrom').value) || 0;
        const yT = parseInt(document.getElementById('yearTo').value) || 2050;
        
        const query = /[a-z]/.test(val) ? autoTranslit(val) : val;

        const results = allData.filter(r => {
            const nameMatch = r[1].toLowerCase().includes(query);
            // Поиск по точному номеру сектора (r[5])
            const sectorMatch = (r[5] && r[5].toLowerCase() === val);
            const b = parseInt(r[2]) || 0;
            const d = parseInt(r[3]) || 2050;
            const yearMatch = (b >= yF || yF === 0) && (d <= yT);
            
            return (nameMatch || sectorMatch) && yearMatch;
        });

        if(results.length) renderResults(results);
        else alert("Ничего не найдено");
    }

    function renderResults(data) {
        document.getElementById('searchBox').style.display = 'none';
        document.getElementById('resultsView').style.display = 'block';
        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = '';

        data.forEach(r => {
            tbody.innerHTML += `
                <tr>
                    <td data-label="ФИО"><b>${r[1]}</b></td>
                    <td data-label="Рождение">${r[2]||'-'}</td>
                    <td data-label="Смерть">${r[3]||'-'}</td>
                    <td data-label="Сектор">${r[5]||'-'}</td>
                    <td data-label="Могила">${r[4]||'-'}</td>
                    <td data-label="Навигация">
                        <button class="btn-map" onclick="focusSector('${r[5]}')">📍 Карта</button>
                        <button class="btn-share" onclick="copyLink('${r[0]}')">🔗</button>
                    </td>
                </tr>`;
        });
    }

    function focusSector(s) {
        const coords = sectorCoords[s] || sectorCoords.default;
        map.flyTo(coords, 18);
        marker.setLatLng(coords).setPopupContent(`<b>Сектор №${s}</b><br>Участок находится в этой области.`).openPopup();
        document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
    }

    function copyLink(id) {
        const link = window.location.origin + window.location.pathname + "?id=" + id;
        navigator.clipboard.writeText(link).then(() => alert("Ссылка скопирована"));
    }

    function toggleFilters() {
        const p = document.getElementById('filterPanel');
        p.style.display = p.style.display === 'none' ? 'grid' : 'none';
    }

    function exportToPDF() {
        const element = document.getElementById('pdf-area');
        html2pdf().from(element).save('Cemetery_Search.pdf');
    }

    window.onload = () => { initMap(); loadData(); };
</script>
</body>
</html>
