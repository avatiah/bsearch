<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSearch | Kishinev Jewish Cemetery</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --brand-color: #1e3a8a;
            --bg-main: #fcfcfd;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --gold: #fbbf24;
            --success: #059669;
        }

        body { 
            margin: 0; padding: 0; background: var(--bg-main); 
            color: var(--text-main); font-family: "Inter", sans-serif; 
            line-height: 1.6;
        }

        .top-bar { display: flex; justify-content: flex-end; padding: 10px 20px; gap: 10px; background: #0f172a; }
        .lang-btn { background: none; border: 1px solid #334155; color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .lang-btn.active { background: var(--brand-color); border-color: var(--brand-color); }

        .hero-section { position: relative; background: var(--brand-color); color: white; padding: 50px 20px; text-align: center; }
        .hero-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('https://images.unsplash.com/photo-1590059392135-cc04192667d4?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-position: center; opacity: 0.15; z-index: 1; }
        .hero-content { position: relative; z-index: 2; }

        .container { max-width: 1000px; margin: -30px auto 40px; padding: 0 20px; position: relative; z-index: 3; }

        .search-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .search-hint { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; font-weight: 500; }
        
        .search-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; width: 100%; box-sizing: border-box; }

        .btn-main { background: var(--brand-color); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: white; color: var(--text-main); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-share { background: #f3f4f6; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--brand-color); font-weight: bold; }

        .results-wrapper { margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #f9fafb; padding: 15px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .fav-star { cursor: pointer; color: #d1d5db; font-size: 20px; transition: color 0.2s; }
        .fav-star.active { color: var(--gold); }
        
        .map-box { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; padding: 10px; margin-top: 30px; }
        .contact-box { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin: 30px 0; }
        .footer { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 14px; border-top: 1px solid var(--border); background: white; }

        @media (max-width: 768px) {
            .search-group { flex-direction: column; }
            table thead { display: none; }
            tr { display: block; background: white; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
            td { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border: none; text-align: right; }
            td::before { content: attr(data-label); font-weight: 800; font-size: 10px; color: var(--text-muted); text-transform: uppercase; text-align: left; margin-right: 10px; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('he')">עב</button>
</div>

<header class="hero-section">
    <div class="hero-bg"></div>
    <div class="hero-content">
        <h1 id="t-title">Кишиневское Еврейское Кладбище</h1>
        <p id="t-subtitle">Электронный реестр памяти</p>
    </div>
</header>

<div class="container">
    <div class="search-card" id="searchArea">
        <div id="status" class="search-hint">Загрузка данных...</div>
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="Фамилия..." disabled>
            <button class="btn-main" id="searchBtn" onclick="performSearch()" disabled>ПОИСК</button>
        </div>
        <button class="btn-text" style="background:none; border:none; color:var(--brand-color); cursor:pointer; font-weight:600;" onclick="showFavorites()">
            ⭐ Избранное (<span id="fav-count">0</span>)
        </button>
    </div>

    <div class="results-wrapper" id="resultsWrapper" style="display:none;">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn-secondary" onclick="resetUI()" id="t-back">← Назад</button>
            <button class="btn-main" onclick="exportToPDF()" style="background:var(--success)">📄 Скачать PDF</button>
        </div>
        <div id="pdf-content">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th class="no-pdf">⭐</th>
                        <th id="t-col-fio">ФИО</th>
                        <th id="t-col-b">Рождение</th>
                        <th id="t-col-d">Смерть</th>
                        <th id="t-col-s">Сектор</th>
                        <th id="t-col-n">№ Могилы</th>
                        <th class="no-pdf">Связь</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <section class="map-box">
        <h3 id="t-map-title" style="padding: 10px 15px; margin: 0; color: var(--brand-color); font-size: 1.1rem;">Схема кладбища</h3>
        <iframe width="100%" height="400" frameborder="0" src="https://www.openstreetmap.org/export/embed.html?bbox=28.7900,47.0320,28.8050,47.0390&layer=mapnik&marker=47.0356,28.7970"></iframe>
    </section>

    <section class="contact-box">
        <h3 id="t-contact-title">Обратная связь</h3>
        <p id="t-contact-hint" style="font-size: 14px; color: var(--text-muted); margin-bottom: 20px;">Сообщите об ошибке или пришлите координаты.</p>
        <form action="https://formspree.io/f/xvzbwgzp" method="POST" style="display: grid; gap: 15px;">
            <input type="email" name="email" placeholder="Email" required style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;">
            <textarea name="message" rows="4" placeholder="Ваше сообщение..." required style="padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit;"></textarea>
            <button type="submit" class="btn-main" id="t-send">ОТПРАВИТЬ</button>
        </form>
    </section>
</div>

<footer class="footer">
    © 2026 BSearch | Kishinev Memorial Registry
</footer>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPQWudyymuRTEaC9_FQYCyZFSoAp2P30Me_Th6dWDMHckiD6BnT3fQ9cfR4UreAlmxrujIb5aqKlJ/pub?gid=726531709&single=true&output=csv';
    let allData = [];
    let currentView = [];
    let favorites = JSON.parse(localStorage.getItem('bsearch_favs') || '[]');
    let currentLang = 'ru';

    const translitMap = {"a":"а","b":"б","v":"в","g":"г","d":"д","e":"е","yo":"ё","zh":"ж","z":"з","i":"и","j":"й","k":"к","l":"л","m":"м","n":"н","o":"о","p":"п","r":"р","s":"с","t":"т","u":"у","f":"ф","h":"х","ts":"ц","ch":"ч","sh":"ш","shch":"щ","y":"ы","yu":"ю","ya":"я"};

    function autoTranslit(text) {
        let output = text.toLowerCase();
        const complex = ["shch","yo","zh","ts","ch","sh","yu","ya"];
        complex.forEach(c => { output = output.replace(new RegExp(c, "g"), translitMap[c]); });
        return output.split('').map(char => translitMap[char] || char).join('');
    }

    const translations = {
        ru: { title: "Кишиневское Еврейское Кладбище", subtitle: "Электронный реестр памяти", search: "ПОИСК", fav: "⭐ Избранное", back: "← Назад", colFio: "ФИО", colB: "Рождение", colD: "Смерть", colS: "Сектор", colN: "№ Могилы", loading: "Поиск на кириллице или латинице", map: "Схема кладбища", contact: "Обратная связь", hint: "Сообщите об ошибке или пришлите координаты.", send: "ОТПРАВИТЬ", link: "🔗 Ссылка" },
        en: { title: "Kishinev Jewish Cemetery", subtitle: "Memorial Registry", search: "SEARCH", fav: "⭐ Favorites", back: "← Back", colFio: "Full Name", colB: "Birth", colD: "Death", colS: "Sector", colN: "Grave #", loading: "Search in Cyrillic or Latin", map: "Cemetery Map", contact: "Contact Us", hint: "Report errors or send coordinates.", send: "SEND", link: "🔗 Link" },
        he: { title: "בית העלמין היהודי בקישינב", subtitle: "מאגר זיכרון אלקטרוני", search: "חיפוש", fav: "⭐ מועדפים", back: "← חזור", colFio: "שם מלא", colB: "לידה", colD: "פטירה", colS: "חלקה", colN: "קבר מס'", loading: "חיפוש בקירילית או לטינית", map: "מפת בית העלמין", contact: "צור קשר", hint: "דווח על טעויות או שלח קואורדינטות", send: "שלח", link: "🔗 קישור" }
    };

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === lang));
        const t = translations[lang];
        document.getElementById('t-title').innerText = t.title;
        document.getElementById('t-subtitle').innerText = t.subtitle;
        document.getElementById('searchBtn').innerText = t.search;
        document.getElementById('t-back').innerText = t.back;
        document.getElementById('status').innerText = t.loading;
        document.querySelectorAll('#resultsTable th').forEach((th, i) => { 
            const labels = ["", t.colFio, t.colB, t.colD, t.colS, t.colN, ""];
            if(labels[i]) th.innerText = labels[i];
        });
        document.getElementById('t-map-title').innerText = t.map;
        document.getElementById('t-contact-title').innerText = t.contact;
        document.getElementById('t-contact-hint').innerText = t.hint;
        document.getElementById('t-send').innerText = t.send;
        document.body.dir = lang === 'he' ? 'rtl' : 'ltr';
    }

    async function init() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            allData = text.split('\n').slice(1).map(line => {
                const cells = []; let cur = ''; let q = false;
                for (let c of line) { if (c === '"') q = !q; else if (c === ',' && !q) { cells.push(cur.trim()); cur = ''; } else cur += c; }
                cells.push(cur.trim()); return cells;
            }).filter(r => r[1]);

            document.getElementById('status').innerText = translations[currentLang].loading;
            document.getElementById('searchInput').disabled = false;
            document.getElementById('searchBtn').disabled = false;
            updateFavCount();

            const urlParams = new URLSearchParams(window.location.search);
            const sharedId = urlParams.get('id');
            if (sharedId) {
                const record = allData.find(r => r[0] === sharedId);
                if (record) render([record]);
            }
        } catch (e) { document.getElementById('status').innerText = "Data error"; }
    }

    function performSearch() {
        const val = document.getElementById('searchInput').value.trim().toLowerCase();
        if(!val) return;
        const query = /[a-z]/.test(val) ? autoTranslit(val) : val;
        currentView = allData.filter(r => r[1].toLowerCase().includes(query));
        if (currentView.length === 0) return alert("Ничего не найдено");
        render(currentView);
    }

    function render(data) {
        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = '';
        data.forEach(row => {
            const isFav = favorites.some(f => f[0] === row[0]);
            tbody.innerHTML += `<tr>
                <td class="no-pdf"><span class="fav-star ${isFav?'active':''}" onclick="toggleFav('${row[0]}')">★</span></td>
                <td data-label="${translations[currentLang].colFio}">${row[1]}</td>
                <td data-label="${translations[currentLang].colB}">${row[2]||'-'}</td>
                <td data-label="${translations[currentLang].colD}">${row[3]||'-'}</td>
                <td data-label="${translations[currentLang].colS}">${row[5]||'-'}</td>
                <td data-label="${translations[currentLang].colN}">${row[4]||'-'}</td>
                <td class="no-pdf"><button class="btn-share" onclick="copyShareLink('${row[0]}')">${translations[currentLang].link}</button></td>
            </tr>`;
        });
        document.getElementById('searchArea').style.display = 'none';
        document.getElementById('resultsWrapper').style.display = 'block';
        window.scrollTo(0,0);
    }

    function copyShareLink(id) {
        const link = `${window.location.origin}${window.location.pathname}?id=${id}`;
        navigator.clipboard.writeText(link).then(() => alert("Ссылка скопирована!"));
    }

    function toggleFav(id) {
        const idx = favorites.findIndex(f => f[0] === id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push(allData.find(r => r[0] === id));
        localStorage.setItem('bsearch_favs', JSON.stringify(favorites));
        updateFavCount();
        render(currentView.length ? currentView : favorites);
    }

    function showFavorites() {
        if (favorites.length === 0) return alert("Пусто");
        currentView = [];
        render(favorites);
    }

    function updateFavCount() { document.getElementById('fav-count').innerText = favorites.length; }
    function resetUI() { 
        document.getElementById('searchArea').style.display = 'block'; 
        document.getElementById('resultsWrapper').style.display = 'none';
        window.history.replaceState({}, '', window.location.pathname);
    }

    function exportToPDF() {
        const element = document.getElementById('pdf-content');
        const hidden = document.querySelectorAll('.no-pdf');
        hidden.forEach(s => s.style.display = 'none');
        html2pdf().set({ margin: 10, filename: 'BSearch.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } })
                 .from(element).save().then(() => hidden.forEach(s => s.style.display = ''));
    }

    document.getElementById('searchInput').onkeypress = e => { if(e.key === 'Enter') performSearch(); };
    window.onload = init;
</script>
</body>
</html>
