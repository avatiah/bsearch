<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSearch | Kishinev Jewish Cemetery</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --brand-color: #1e3a8a;
            --bg-main: #fcfcfd;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --gold: #fbbf24;
        }

        body { 
            margin: 0; padding: 0; background: var(--bg-main); 
            color: var(--text-main); font-family: "Inter", sans-serif; 
            line-height: 1.6;
        }

        /* Шапка и переключатель языков */
        .top-bar { display: flex; justify-content: flex-end; padding: 10px 20px; gap: 10px; background: #0f172a; }
        .lang-btn { background: none; border: 1px solid #334155; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .lang-btn.active { background: var(--brand-color); border-color: var(--brand-color); }

        .hero-section { position: relative; background: var(--brand-color); color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 1000px; margin: -30px auto 40px; padding: 0 20px; position: relative; z-index: 3; }

        .search-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .search-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-text { background: none; border: none; color: var(--brand-color); cursor: pointer; font-size: 13px; font-weight: 600; padding: 0; }

        .btn-main { background: var(--brand-color); color: white; border: none; padding: 14px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 10px; }

        /* Таблица и Избранное */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-top: 20px; }
        th { background: #f9fafb; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .fav-star { cursor: pointer; color: #d1d5db; font-size: 18px; transition: color 0.2s; }
        .fav-star.active { color: var(--gold); }

        .filters-panel { display: none; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; background: #f9fafb; border-radius: 8px; margin-bottom: 15px; }

        @media (max-width: 768px) {
            .search-group { flex-direction: column; }
            td::before { content: attr(data-label); font-weight: 800; font-size: 10px; color: var(--text-muted); }
            tr { display: block; border: 1px solid var(--border); margin-bottom: 15px; padding: 10px; border-radius: 8px; }
            td { display: flex; justify-content: space-between; border: none; padding: 5px 0; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('he')">עב</button>
</div>

<header class="hero-section">
    <h1 id="t-title">Кишиневское Еврейское Кладбище</h1>
    <p id="t-subtitle">Электронный реестр памяти</p>
</header>

<div class="container">
    <div class="search-card" id="searchArea">
        <div id="status" class="search-hint" style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px;">Загрузка...</div>
        
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="Фамилия..." disabled>
            <button class="btn-main" id="searchBtn" onclick="performSearch()" disabled>ПОИСК</button>
        </div>

        <div class="controls">
            <button class="btn-text" onclick="toggleFilters()" id="t-filter-btn">⚙ Настроить годы</button>
            <button class="btn-text" onclick="showFavorites()" id="t-fav-btn">⭐ Избранное (<span id="fav-count">0</span>)</button>
        </div>
        
        <div id="filtersPanel" class="filters-panel">
            <input type="number" id="yearFrom" placeholder="Год от">
            <input type="number" id="yearTo" placeholder="Год до">
        </div>
    </div>

    <div class="results-wrapper" id="resultsWrapper" style="display:none;">
        <div style="margin-bottom: 15px;">
            <button class="btn-secondary" onclick="resetUI()" id="t-back">← Назад</button>
            <button class="btn-main" onclick="exportToPDF()" style="background:#059669">📄 PDF</button>
        </div>
        
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>⭐</th>
                    <th id="t-col-fio">ФИО</th>
                    <th id="t-col-b">Рождение</th>
                    <th id="t-col-d">Смерть</th>
                    <th id="t-col-s">Сектор</th>
                    <th id="t-col-n">№ Могилы</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPQWudyymuRTEaC9_FQYCyZFSoAp2P30Me_Th6dWDMHckiD6BnT3fQ9cfR4UreAlmxrujIb5aqKlJ/pub?gid=726531709&single=true&output=csv';
    
    let allData = [];
    let currentView = [];
    let favorites = JSON.parse(localStorage.getItem('bsearch_favs') || '[]');
    let currentLang = 'ru';

    const translations = {
        ru: { title: "Кишиневское Еврейское Кладбище", subtitle: "Электронный реестр памяти", search: "ПОИСК", filter: "⚙ Годы жизни", fav: "⭐ Избранное", back: "← Назад", colFio: "ФИО", colB: "Рождение", colD: "Смерть", colS: "Сектор", colN: "№ Могилы", loading: "Реестр загружен", empty: "Ничего не найдено" },
        en: { title: "Kishinev Jewish Cemetery", subtitle: "Electronic Memorial Registry", search: "SEARCH", filter: "⚙ Year Filter", fav: "⭐ Favorites", back: "← Back", colFio: "Full Name", colB: "Birth", colD: "Death", colS: "Sector", colN: "Grave #", loading: "Database loaded", empty: "No results found" },
        he: { title: "בית העלמין היהודי בקישינב", subtitle: "מאגר זיכרון אלקטרוני", search: "חיפוש", filter: "⚙ פילטר שנים", fav: "⭐ מועדפים", back: "← חזור", colFio: "שם מלא", colB: "לידה", colD: "פטירה", colS: "חלקה", colN: "קבר מס'", loading: "הנתונים נטענו", empty: "לא נמצאו תוצאות" }
    };

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === lang));
        document.getElementById('t-title').innerText = translations[lang].title;
        document.getElementById('t-subtitle').innerText = translations[lang].subtitle;
        document.getElementById('searchBtn').innerText = translations[lang].search;
        document.getElementById('t-filter-btn').innerText = translations[lang].filter;
        document.getElementById('t-fav-btn').innerHTML = `${translations[lang].fav} (<span id="fav-count">${favorites.length}</span>)`;
        document.getElementById('t-back').innerText = translations[lang].back;
        document.getElementById('t-col-fio').innerText = translations[lang].colFio;
        document.getElementById('t-col-b').innerText = translations[lang].colB;
        document.getElementById('t-col-d').innerText = translations[lang].colD;
        document.getElementById('t-col-s').innerText = translations[lang].colS;
        document.getElementById('t-col-n').innerText = translations[lang].colN;
        document.body.dir = lang === 'he' ? 'rtl' : 'ltr';
    }

    async function init() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            allData = text.split('\n').slice(1).map(line => line.split(',').map(c => c.replace(/"/g, '').trim())).filter(r => r[1]);
            document.getElementById('status').innerText = translations[currentLang].loading;
            document.getElementById('searchInput').disabled = false;
            document.getElementById('searchBtn').disabled = false;
            updateFavCount();
        } catch (e) { document.getElementById('status').innerText = "Error loading data"; }
    }

    function performSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const yF = parseInt(document.getElementById('yearFrom').value) || 0;
        const yT = parseInt(document.getElementById('yearTo').value) || 2100;
        
        currentView = allData.filter(r => r[1].toLowerCase().includes(q) && (parseInt(r[2]) >= yF || yF === 0) && (parseInt(r[3]) <= yT));
        if (currentView.length === 0) return alert(translations[currentLang].empty);
        render(currentView);
    }

    function render(data) {
        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = '';
        data.forEach(row => {
            const isFav = favorites.some(f => f[0] === row[0]);
            tbody.innerHTML += `<tr>
                <td><span class="fav-star ${isFav?'active':''}" onclick="toggleFav('${row[0]}')">★</span></td>
                <td data-label="${translations[currentLang].colFio}">${row[1]}</td>
                <td data-label="${translations[currentLang].colB}">${row[2]||'-'}</td>
                <td data-label="${translations[currentLang].colD}">${row[3]||'-'}</td>
                <td data-label="${translations[currentLang].colS}">${row[5]||'-'}</td>
                <td data-label="${translations[currentLang].colN}">${row[4]||'-'}</td>
            </tr>`;
        });
        document.getElementById('searchArea').style.display = 'none';
        document.getElementById('resultsWrapper').style.display = 'block';
    }

    function toggleFav(id) {
        const row = allData.find(r => r[0] === id);
        const idx = favorites.findIndex(f => f[0] === id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push(row);
        localStorage.setItem('bsearch_favs', JSON.stringify(favorites));
        updateFavCount();
        render(currentView);
    }

    function showFavorites() {
        if (favorites.length === 0) return alert("Список избранного пуст");
        currentView = favorites;
        render(favorites);
    }

    function updateFavCount() { document.getElementById('fav-count').innerText = favorites.length; }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        // Примечание: Для кириллицы в PDF в реальном проекте нужно подключать шрифт .ttf
        // Здесь используется стандартный шрифт (может не отображать кириллицу в некоторых браузерах без настройки шрифтов)
        doc.text(translations[currentLang].title, 10, 10);
        const tableData = currentView.map(r => [r[1], r[2], r[3], r[5], r[4]]);
        doc.autoTable({
            head: [[translations[currentLang].colFio, translations[currentLang].colB, translations[currentLang].colD, translations[currentLang].colS, translations[currentLang].colN]],
            body: tableData,
            startY: 20
        });
        doc.save('bsearch_registry.pdf');
    }

    function resetUI() { document.getElementById('searchArea').style.display = 'block'; document.getElementById('resultsWrapper').style.display = 'none'; }
    function toggleFilters() { const p = document.getElementById('filtersPanel'); p.style.display = p.style.display==='grid'?'none':'grid'; }
    
    window.onload = init;
</script>

</body>
</html>
